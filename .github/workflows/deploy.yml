name: Deploy to Render

on:
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    name: Deploy to Production

    steps:
      - uses: actions/checkout@v4

      - name: Check deployment secrets
        id: check_secrets
        run: |
          if [ -z "${{ secrets.RENDER_SERVICE_ID }}" ] || [ -z "${{ secrets.RENDER_API_KEY }}" ]; then
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "⚠️  Render deployment secrets not configured"
            echo "Set RENDER_SERVICE_ID and RENDER_API_KEY in GitHub Secrets"
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi

      - name: Trigger Render Deployment
        if: steps.check_secrets.outputs.configured == 'true'
        run: |
          echo "Triggering Render deployment..."
          curl --request POST \
            --url "https://api.render.com/deploy/srv-${{ secrets.RENDER_SERVICE_ID }}?key=${{ secrets.RENDER_API_KEY }}" \
            -v
          echo "Deployment triggered successfully"

      - name: Wait for deployment to be ready
        if: steps.check_secrets.outputs.configured == 'true'
        run: |
          echo "Waiting 30 seconds for deployment to start..."
          sleep 30

          # Try health check with retries
          ATTEMPTS=0
          MAX_ATTEMPTS=20
          while [ $ATTEMPTS -lt $MAX_ATTEMPTS ]; do
            echo "Health check attempt $((ATTEMPTS+1))/$MAX_ATTEMPTS..."
            if curl -s -f https://aeterna-api.onrender.com/health > /dev/null 2>&1; then
              echo "✅ Health check passed!"
              exit 0
            fi
            ATTEMPTS=$((ATTEMPTS+1))
            if [ $ATTEMPTS -lt $MAX_ATTEMPTS ]; then
              echo "Retrying in 15 seconds..."
              sleep 15
            fi
          done

          echo "⚠️  Health check timed out, but deployment may still be starting"
          echo "Check Render dashboard: https://dashboard.render.com"
          exit 0

      - name: Log deployment status
        if: always()
        run: |
          echo "Deployment Status: ${{ job.status }}"
          echo "Render Dashboard: https://dashboard.render.com"
          if [ "${{ steps.check_secrets.outputs.configured }}" == "false" ]; then
            echo ""
            echo "⚠️  To enable auto-deployment:"
            echo "1. Go to your GitHub repository Settings"
            echo "2. Secrets → Actions → New repository secret"
            echo "3. Add RENDER_SERVICE_ID"
            echo "4. Add RENDER_API_KEY"
            echo "5. Get values from Render dashboard"
          fi
