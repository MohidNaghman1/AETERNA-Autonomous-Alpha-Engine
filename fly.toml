app = "aeterna-autonomous-alpha-engine"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PYTHONUNBUFFERED = "1"

[processes]
  worker = "python onchain_worker.py"
  consumer = "python -m app.modules.ingestion.application.consumer"
  resolver = "python -m app.modules.intelligence.application.trade_records"

[deploy]
  strategy = "immediate"

[[vm]]
  processes = ["worker"]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256

[[vm]]
  processes = ["consumer"]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256

[[vm]]
  processes = ["resolver"]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
