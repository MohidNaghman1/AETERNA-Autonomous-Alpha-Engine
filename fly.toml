app = "aeterna-autonomous-alpha-engine"
primary_region = "iad"

[build]
dockerfile = "Dockerfile"

[env]
SERVICE_TYPE = "onchain-worker"
PYTHONUNBUFFERED = "1"

[processes]
worker = "python onchain_worker.py"

[deploy]
strategy = "immediate"
release_command = "alembic upgrade head"

[[vm]]
cpu_kind = "shared"
cpus = 1
memory_mb = 256
