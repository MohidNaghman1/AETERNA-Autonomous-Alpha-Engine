app = "aeterna-autonomous-alpha-engine"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PYTHONUNBUFFERED = "1"

[processes]
  worker = "SERVICE_TYPE=worker /app/start.sh"
  consumer = "SERVICE_TYPE=consumer /app/start.sh"
  resolver = "SERVICE_TYPE=resolver /app/start.sh"

[deploy]
  strategy = "immediate"

[[vm]]
  processes = ["worker"]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256

[[vm]]
  processes = ["consumer"]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256

[[vm]]
  processes = ["resolver"]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
