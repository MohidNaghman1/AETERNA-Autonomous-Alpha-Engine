app = "aeterna-autonomous-alpha-engine"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PYTHONUNBUFFERED = "1"
  ENABLE_BACKGROUND_TASKS = "false"

[processes]
  # On-chain worker: separate isolated process for blockchain monitoring
  # Main API with workers runs on Render/local deployment
  worker = "python onchain_worker.py"

[deploy]
  strategy = "immediate"

[[vm]]
  processes = ["worker"]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
