# =====================================================================
# Render.com Deployment Configuration
# AETERNA - Autonomous Alpha Engine
# Option 2: Single Web Service with Background Tasks (Free Tier Compatible)
# =====================================================================

services:
  # Main FastAPI Application (with background consumer + collectors)
  - type: web
    name: aeterna-api
    runtime: docker
    plan: free
    autoDeploy: true
    branch: main

    envVars:
      - key: PORT
        value: 8000
      - key: SERVICE_TYPE
        value: api
      - key: ENABLE_BACKGROUND_TASKS
        value: true
      - key: ENABLE_EVENT_CONSUMER
        value: false
      - key: ENABLE_SCHEDULED_COLLECTORS
        value: true
      - key: ENABLE_ALERT_CONSUMER
        value: true
      - key: ENABLE_PROMETHEUS_HTTP_SERVER
        value: false
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: PYTHONUNBUFFERED
        value: 1

      # Database Configuration
      - key: DATABASE_URL
        value: ${DATABASE_URL}

      # Redis Configuration (using Redis Cloud free tier)
      - key: REDIS_URL
        value: ${REDIS_URL}
      - key: CELERY_BROKER_URL
        value: ${REDIS_URL}
      - key: CELERY_RESULT_BACKEND
        value: ${REDIS_URL}

      # RabbitMQ Configuration (using CloudAMQP free tier)
      # IMPORTANT: Use the full RABBITMQ_URL which includes vhost
      - key: RABBITMQ_URL
        value: ${RABBITMQ_URL}
      - key: RABBITMQ_QUEUE
        value: events

  # Dedicated RabbitMQ consumer worker so messages are always drained even if the API restarts.
  - type: worker
    name: aeterna-consumer
    runtime: docker
    plan: free
    autoDeploy: true
    branch: main

    startCommand: python -m app.modules.ingestion.application.consumer

    envVars:
      - key: SERVICE_TYPE
        value: consumer
      - key: ENABLE_BACKGROUND_TASKS
        value: false
      - key: ENABLE_EVENT_CONSUMER
        value: true
      - key: ENABLE_SCHEDULED_COLLECTORS
        value: false
      - key: ENABLE_ALERT_CONSUMER
        value: false
      - key: DATABASE_URL
        value: ${DATABASE_URL}
      - key: REDIS_URL
        value: ${REDIS_URL}
      - key: CELERY_BROKER_URL
        value: ${REDIS_URL}
      - key: CELERY_RESULT_BACKEND
        value: ${REDIS_URL}
      - key: RABBITMQ_URL
        value: ${RABBITMQ_URL}
      - key: RABBITMQ_QUEUE
        value: events
      # Backlog catch-up tuning; lower INTELLIGENCE_POLL_EVERY_N_BATCHES to 1 after queue is drained.
      - key: CONSUMER_BATCH_SIZE
        value: 250
      - key: INTELLIGENCE_POLL_EVERY_N_BATCHES
        value: 99999

databases:
  - name: Aeterna
    databaseName: aeterna_db
    plan: free
    postgresMajorVersion: 15
