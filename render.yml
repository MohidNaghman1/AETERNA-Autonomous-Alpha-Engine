# =====================================================================
# Render.com Deployment Configuration
# AETERNA - Autonomous Alpha Engine
# =====================================================================

services:
  # Main FastAPI Application
  - type: web
    name: aeterna-api
    runtime: docker
    plan: free
    autoDeploy: true
    branch: main
    preDeployCommand: /bin/bash -c 'cd /app && python -m alembic upgrade head || true'

    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: PYTHONUNBUFFERED
        value: 1

      # Database Configuration
      - key: DATABASE_URL
        value: ${DATABASE_URL}

      # Redis Configuration (using Redis Cloud free tier)
      - key: REDIS_URL
        value: ${REDIS_URL}

      # RabbitMQ Configuration (using CloudAMQP free tier)
      - key: RABBITMQ_URL
        value: ${RABBITMQ_URL}

  # PostgreSQL Database (removed - using external Aeterna database via render.yml databases section)

  # Redis Cache Service (removed - using Aeterna_RebbitMq service instead)
  # RabbitMQ Message Broker (removed - using Aeterna_RebbitMq service instead)

  # Celery Worker for Async Tasks
  - type: worker
    name: aeterna-celery-worker
    runtime: docker
    plan: free
    autoDeploy: true
    branch: main

    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: PYTHONUNBUFFERED
        value: 1

      - key: DATABASE_URL
        value: ${DATABASE_URL}

      - key: REDIS_URL
        value: ${REDIS_URL}

      - key: RABBITMQ_URL
        value: ${RABBITMQ_URL}

    startCommand: celery -A app.modules.ingestion.infrastructure.celery_app worker -l info

databases:
  - name: Aeterna
    databaseName: aeterna_db
    user: postgres
    plan: free
    postgresMajorVersion: 15
