# =====================================================================
# Render.com Deployment Configuration
# AETERNA - Autonomous Alpha Engine
# =====================================================================

services:
  # Main FastAPI Application
  - type: web
    name: aeterna-api
    runtime: docker
    plan: free
    autoDeploy: true
    branch: main

    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: PYTHONUNBUFFERED
        value: 1

      # Database Configuration
      - key: DATABASE_URL
        value: ${DATABASE_URL}

      # Redis Configuration (using Redis Cloud free tier)
      - key: REDIS_URL
        value: ${REDIS_URL}
      - key: CELERY_BROKER_URL
        value: ${REDIS_URL}
      - key: CELERY_RESULT_BACKEND
        value: ${REDIS_URL}

      # RabbitMQ Configuration (using CloudAMQP free tier)
      # IMPORTANT: Use the full RABBITMQ_URL which includes vhost
      - key: RABBITMQ_URL
        value: ${RABBITMQ_URL}
      - key: RABBITMQ_QUEUE
        value: events

  # PostgreSQL Database (removed - using external Aeterna database via render.yml databases section)

  # Redis Cache Service (removed - using Aeterna_RebbitMq service instead)
  # RabbitMQ Message Broker (removed - using Aeterna_RebbitMq service instead)

  # Celery Worker for Async Tasks
  - type: worker
    name: aeterna-celery-worker
    runtime: docker
    plan: free
    autoDeploy: true
    branch: main

    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: PYTHONUNBUFFERED
        value: 1

      - key: DATABASE_URL
        value: ${DATABASE_URL}

      - key: REDIS_URL
        value: ${REDIS_URL}
      - key: CELERY_BROKER_URL
        value: ${REDIS_URL}
      - key: CELERY_RESULT_BACKEND
        value: ${REDIS_URL}

      - key: RABBITMQ_URL
        value: ${RABBITMQ_URL}
      - key: RABBITMQ_QUEUE
        value: events

    startCommand: celery -A app.modules.ingestion.application.celery_app worker -l info

  # Celery Beat for Scheduling Collectors
  - type: worker
    name: aeterna-celery-beat
    runtime: docker
    plan: free
    autoDeploy: true
    branch: main

    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: PYTHONUNBUFFERED
        value: 1

      - key: DATABASE_URL
        value: ${DATABASE_URL}

      - key: REDIS_URL
        value: ${REDIS_URL}
      - key: CELERY_BROKER_URL
        value: ${REDIS_URL}
      - key: CELERY_RESULT_BACKEND
        value: ${REDIS_URL}

      - key: RABBITMQ_URL
        value: ${RABBITMQ_URL}
      - key: RABBITMQ_QUEUE
        value: events

    startCommand: celery -A app.modules.ingestion.application.celery_app beat -l info

  # Event Consumer from RabbitMQ
  - type: worker
    name: aeterna-consumer
    runtime: docker
    plan: free
    autoDeploy: true
    branch: main

    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: PYTHONUNBUFFERED
        value: 1

      - key: DATABASE_URL
        value: ${DATABASE_URL}

      - key: REDIS_URL
        value: ${REDIS_URL}

      - key: RABBITMQ_URL
        value: ${RABBITMQ_URL}
      - key: RABBITMQ_QUEUE
        value: events

    startCommand: python -m app.modules.ingestion.application.consumer

databases:
  - name: Aeterna
    databaseName: aeterna_db
    user: postgres
    plan: free
    postgresMajorVersion: 15
